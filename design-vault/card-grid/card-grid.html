<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Vault | Card Grid</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,500,700&f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../shared/theme.css">
    <style>
        .grid-section {
            padding: 40px 24px 100px;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 32px;
            width: 100%;
        }

        /* Card Component */
        .dv-card {
            background: var(--dv-surface-dark);
            border: 1px solid var(--dv-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all var(--transition-smooth);
            cursor: pointer;
            position: relative;
        }

        .dv-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        /* Image Container */
        .card-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            background: #252525;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 600ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dv-card:hover .card-image-wrapper img {
            transform: scale(1.08);
        }

        /* Hover Overlay */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 300ms ease;
            z-index: 10;
        }

        .dv-card:hover .card-overlay {
            opacity: 1;
        }

        .overlay-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 200ms ease;
        }

        .overlay-btn:hover {
            background: var(--dv-brand-yellow);
            color: #000;
            transform: scale(1.1);
        }

        /* Card Content */
        .card-footer {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 700;
            color: var(--dv-text);
        }

        .card-tag {
            font-size: 12px;
            font-weight: 600;
            color: var(--dv-text-ghost);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .author-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #333;
            border: 1px solid var(--dv-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .grid-section {
                padding-top: 20px;
            }
        }
    </style>
</head>

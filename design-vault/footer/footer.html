        <div class="footer-big-text-wrapper">
          <span class="footer-big-text" id="footerBigText">Ref.design</span>
        </div>

        <script>
          function fitFooterText() {
            const wrapper = document.querySelector('.footer-big-text-wrapper');
            const text = document.getElementById('footerBigText');
            if (!wrapper || !text) return;

            // Reset first
            text.style.fontSize = '10px';

            const targetWidth = wrapper.getBoundingClientRect().width;
            let low = 10, high = 600, mid;

            while (low <= high) {
              mid = Math.floor((low + high) / 2);
              text.style.fontSize = mid + 'px';
              if (text.getBoundingClientRect().width < targetWidth) {
                low = mid + 1;
              } else {
                high = mid - 1;
              }
            }
            text.style.fontSize = high + 'px';
          }

          // Run after full page load
          if (document.readyState === 'complete') {
            fitFooterText();
          } else {
            window.addEventListener('load', fitFooterText);
          }
          window.addEventListener('resize', fitFooterText);
        </script>

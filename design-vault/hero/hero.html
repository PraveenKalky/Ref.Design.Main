<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Vault | Hero Section</title>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,500,700&f[]=satoshi@900,700,500,300,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/theme.css">
    <style>
        .hero-section {
            padding: 160px 24px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }

        .hero-content {
            max-width: 680px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dv-border);
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 600;
            color: var(--dv-text-ghost);
            margin-bottom: 32px;
            letter-spacing: 0.02em;
        }

        .hero-section h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            white-space: normal;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            color: var(--dv-text);
            max-width: 900px;
        }

        .hero-subtitle {
            font-size: 18px;
            line-height: 1.6;
            color: var(--dv-text-ghost);
            margin-bottom: 40px;
        }

        .hero-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 56px;
        }

        .cta-button {
            background: var(--dv-brand-yellow);
            color: #000000;
            border: none;
            padding: 12px 28px;
            border-radius: var(--radius-pill);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 200ms ease;
        }

        .cta-button:hover { transform: scale(1.03); }

        .button-ghost {
            background: transparent;
            border: 1px solid var(--dv-border);
            color: var(--dv-text);
            padding: 12px 28px;
            border-radius: var(--radius-pill);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        .hero-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            padding-top: 24px;
            border-top: 1px solid var(--dv-border);
        }

        .stat-item {
            font-size: 14px;
            font-weight: 600;
            color: var(--dv-text-ghost);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--dv-text-ghost); opacity: 0.3;
        }

        @media (max-width: 768px) {
            .hero-section { padding-top: 100px; }
            .hero-section h1 { font-size: 36px; white-space: normal; }
            .hero-buttons { flex-direction: column; width: 100%; }
            .hero-buttons button { width: 100%; }
            .hero-stats { flex-direction: column; gap: 12px; }
            .stat-dot { display: none; }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="hero-content">
            <div class="hero-badge">Free · Open · Always Growing</div>
            <h1>Every flow. Every screen. <span style="color:var(--dv-brand-yellow)">One vault.</span></h1>
            <p class="hero-subtitle">
                A curated library of UI flows, websites, landing pages, dashboards, Figma components and font resources — built for designers and developers.
            </p>
            <div class="hero-buttons">
                <button class="cta-button">Explore Flows</button>
                <button class="button-ghost">Browse Categories</button>
            </div>
            <div class="hero-stats">
                <div class="stat-item">240+ Flows</div>
                <div class="stat-dot"></div>
                <div class="stat-item">180+ Websites</div>
                <div class="stat-dot"></div>
                <div class="stat-item">90+ Components</div>
                <div class="stat-dot"></div>
                <div class="stat-item">60+ Font Links</div>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sticky Navbar | Design Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #e5e5e5;
            --accent-color: #000000;
            --accent-text: #ffffff;
            --ghost-hover: #f5f5f5;
            --nav-height-desktop: 64px;
            --nav-height-mobile: 56px;
            --transition-speed: 200ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 200vh; /* For scroll testing */
        }

        /* --- Navbar Styles --- */
        .nav-wrapper {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height-desktop);
            z-index: 1000;
            background-color: transparent;
            border-bottom: 1px solid transparent;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-wrapper.scrolled {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom-color: var(--border-color);
        }

        .nav-container {
            width: 100%;
            max-width: 1440px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* --- Left Section --- */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 1;
        }

        .logo-dv {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f3f3f3;
            border-radius: 999px;
            padding: 0 16px;
            height: 40px;
            width: 320px;
            gap: 8px;
            transition: all var(--transition-speed) ease;
            border: 1px solid transparent;
        }

        .search-bar:focus-within {
            background: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 14px;
            color: var(--text-main);
            font-weight: 400;
        }

        .search-bar input::placeholder {
            color: #999;
        }

        .search-bar .lucide {
            color: #666;
            flex-shrink: 0;
        }

        /* --- Center Section --- */
        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
        }

        .tab-control-container {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 4px;
            position: relative;
            overflow: hidden;
        }

        .tab-list {
            display: flex;
            gap: 0;
            position: relative;
        }

        .tab-item {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 999px;
            transition: color var(--transition-speed) ease;
            z-index: 1;
            white-space: nowrap;
            user-select: none;
        }

        .tab-item.active {
            color: var(--accent-text);
        }

        .tab-active-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            background: var(--accent-color);
            border-radius: 999px;
            transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        /* --- Right Section --- */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .btn-ghost {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background var(--transition-speed) ease;
            cursor: pointer;
        }

        .btn-ghost:hover {
            background: var(--ghost-hover);
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--accent-text);
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: opacity var(--transition-speed) ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            border: 1px solid var(--border-color);
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Mobile Overlay/Search Trigger --- */
        .mobile-search-trigger {
            display: none;
            padding: 8px;
            cursor: pointer;
        }

        /* --- Content Placeholder --- */
        .content {
            padding-top: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 24px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 80px;
        }

        .hero-section h1 {
            font-size: 56px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Responsive --- */
        @media (max-width: 1024px) {
            .search-bar {
                width: 240px;
            }
        }

        @media (max-width: 768px) {
            .nav-wrapper {
                height: var(--nav-height-mobile);
            }

            .nav-container {
                padding: 0 16px;
            }

            .search-bar {
                display: none;
            }

            .mobile-search-trigger {
                display: flex;
            }

            .nav-center {
                position: relative;
                left: 0;
                transform: none;
                flex: 1;
                margin: 0 12px;
                overflow-x: auto;
                scrollbar-width: none; /* Hide scrollbar Firefox */
            }

            .nav-center::-webkit-scrollbar {
                display: none; /* Hide scrollbar Chrome/Safari */
            }

            .tab-control-container {
                border: none;
                padding: 0;
            }

            .tab-active-pill {
                top: 0;
                height: 100%;
                /* Reset positions for mobile scroll if needed, but the basic sliding still works */
            }

            .btn-ghost span {
                display: none;
            }

            .btn-primary {
                padding: 8px 16px;
                font-size: 13px;
            }

            .nav-right {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-wrapper" id="main-nav">
        <div class="nav-container">
            <!-- Left: Logo & Search -->
            <div class="nav-left">
                <div class="logo-dv">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="28" height="28" rx="8" fill="#000"/>
                        <!-- Geometric D -->
                        <path d="M8 8V20H11C13.2091 20 15 18.2091 15 16V12C15 9.79086 13.2091 8 11 8H8Z" fill="white"/>
                        <path d="M10 10V18H11C12.1046 18 13 17.1046 13 16V12C13 10.8954 12.1046 10 11 10H10Z" fill="black"/>
                        <!-- Geometric V -->
                        <path d="M17 8 L19.5 14 L22 8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                
                <div class="search-bar">
                    <i data-lucide="search" size="18"></i>
                    <input type="text" placeholder="Search Websites, Screens, UI Elements, Flows">
                </div>

                <div class="mobile-search-trigger">
                    <i data-lucide="search" size="20"></i>
                </div>
            </div>

            <!-- Center: Segmented Tabs -->
            <div class="nav-center">
                <div class="tab-control-container">
                    <div class="tab-active-pill" id="tab-pill"></div>
                    <div class="tab-list">
                        <div class="tab-item active" data-index="0">Websites</div>
                        <div class="tab-item" data-index="1">Landing Pages</div>
                        <div class="tab-item" data-index="2">Flows</div>
                        <div class="tab-item" data-index="3">Figma</div>
                        <div class="tab-item" data-index="4">Tastes</div>
                    </div>
                </div>
            </div>

            <!-- Right: Actions & Avatar -->
            <div class="nav-right">
                <div class="btn-ghost">
                    <i data-lucide="bookmark" size="18"></i>
                    <span>Saved</span>
                </div>
                <a href="#" class="btn-primary">Submit a Flow</a>
                <div class="avatar" title="Pratham G.">
                    PG
                </div>
            </div>
        </div>
    </nav>

    <main class="content">
        <section class="hero-section">
            <h1>Design Vault</h1>
            <p>Curated design patterns, user flows, and interface inspirations for modern digital products.</p>
        </section>

        <!-- Placeholder content to enable scrolling -->
        <div style="height: 1000px; background: linear-gradient(180deg, #f9f9f9 0%, #fff 100%); border-radius: 24px; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; color: #999;">
            Scroll to see sticky navbar and blur effect
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Sticky Blur Effect
        const nav = document.getElementById('main-nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Sliding Pill Animation
        const tabItems = document.querySelectorAll('.tab-item');
        const pill = document.getElementById('tab-pill');

        function updatePill(element) {
            const rect = element.getBoundingClientRect();
            const containerRect = element.parentElement.getBoundingClientRect();
            
            // On mobile, the parent is tab-list, which is inside tab-control-container (the border container)
            // But if we want it pixel perfect, we need horizontal scrolling offset consideration
            pill.style.width = `${rect.width}px`;
            pill.style.left = `${element.offsetLeft}px`;
        }

        // Initial pill position
        const activeTab = document.querySelector('.tab-item.active');
        if (activeTab) {
            updatePill(activeTab);
        }

        tabItems.forEach(item => {
            item.addEventListener('click', () => {
                // Remove active class from all
                tabItems.forEach(t => t.classList.remove('active'));
                // Add to clicked
                item.classList.add('active');
                // Move pill
                updatePill(item);

                // On mobile, center the clicked tab
                if (window.innerWidth <= 768) {
                    item.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            });
        });

        // Handle window resize to keep pill aligned
        window.addEventListener('resize', () => {
            const currentActive = document.querySelector('.tab-item.active');
            if (currentActive) {
                updatePill(currentActive);
            }
        });

    </script>
</body>
</html>
